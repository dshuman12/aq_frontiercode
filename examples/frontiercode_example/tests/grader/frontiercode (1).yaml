    category: regular
    description: Restoring everything except the reference tests to the base commit makes make fail, proving the tests exercise the change.
    method: command
    blocker: true
    weight: 0.08
    command: python3 tests/hidden/run_criteria.py --criterion reference_tests_fail_on_base environment/repo
  - id: scope_confined_to_warning_sites
    category: regular
    description: The patch changes only the logging implementation and warning call sites under src/, without unrelated rewrites or excessive churn. It does not modify hidden or reference tests.
    method: scope
    blocker: true
    weight: 0.08
    scope:
      allowed_paths:
        - src/
      denied_paths:
        - test/
        - tests/
        - docs/
      max_files: 8
      max_changed_lines: 250
  - id: code_quality_idiomatic_logging
    category: regular
    description: The LOG_WARNING conversion is idiomatic, consistent, and maintainable - all warning paths use LOG_WARNING with no leftover std::cerr warning code, call-site conversions match the surrounding style, and the helper reads as something a maintainer would merge without rework.
    method: llm_prompt
    blocker: false
    weight: 0.12
    threshold: 0.6
    prompt: Score from 0 to 1 whether the warning-to-LOG_WARNING conversion is idiomatic and consistent across every call site, with no mixed std::cerr and LOG_WARNING warning paths left behind, and a clean readable implementation that conforms to the codebase's logging conventions.
