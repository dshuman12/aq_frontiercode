    method: llm_prompt
    blocker: false
    weight: 0.05
    threshold: 0.6
    prompt: Score whether the diff fixes decoder length overflow cleanly, keeps normal decoding semantics intact, avoids broad rewrites, and follows the repository's existing C++17 Result<T> style.
