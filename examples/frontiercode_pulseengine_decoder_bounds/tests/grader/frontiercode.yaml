    blocker: true
    weight: 0.35
    command: python3 tests/hidden/run_criteria.py --criterion hidden_decoder_bounds_tests environment/repo
    timeout_seconds: 300
  - id: submitted_tests_fail_on_base
    category: regular
    description: The submitted visible tests capture the decoder length bug because they fail against the hidden base snapshot.
    method: command
    blocker: true
    weight: 0.2
    command: python3 tests/hidden/run_criteria.py --criterion submitted_tests_fail_on_base environment/repo
    timeout_seconds: 300
  - id: visible_regression_tests_pass
    category: regular
    description: The visible C++ regression tests still build and pass after the patch.
    method: command
    blocker: true
    weight: 0.2
    command: python3 tests/hidden/run_criteria.py --criterion visible_regression_tests_pass environment/repo
    timeout_seconds: 300
  - id: no_unsafe_length_addition
    category: patch_specific
    description: Decoder length validation no longer uses overflowing pos_ + length checks for strings or byte arrays.
    method: command
    blocker: true
    weight: 0.1
    command: python3 tests/hidden/run_criteria.py --criterion no_unsafe_length_addition environment/repo
  - id: codec_scope_is_local
    category: regular
    description: The patch stays in the codec decoder and relevant codec tests.
    method: command
    blocker: true
    weight: 0.1
    command: python3 tests/hidden/run_criteria.py --criterion codec_scope_is_local environment/repo
