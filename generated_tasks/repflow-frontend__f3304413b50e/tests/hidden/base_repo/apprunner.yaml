# Production — `repflow-frontend` App Runner (`main` branch).
# Pool + API must match `repflow` main: us-east-2_UOedUZggp + qppc8ivf44 backend.
# NEXTAUTH_URL must match the browser origin for this deployment (prod App Runner default below).
# Regenerate via: `npm run stripe:sync && npm run apprunner:write-prod -- --stack prod --write`
# Dev stack lives on `dev` branch only — do not merge dev apprunner.yaml into main as-is.

