name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run Unit Tests"
        required: true
        type: boolean
        default: true
      run_e2e_tests:
        description: "Run E2E Tests"
        required: true
        type: boolean
        default: true

concurrency:
  group: staging-terraform
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      pr_versions: ${{ steps.versions.outputs.pr_versions }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compute Release Version
        id: version
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${BRANCH}@${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Query active PR previews
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --repo ${{ github.repository }} --label preview --state open --json number --jq '.[].number')
          VERSIONS="{"
          FIRST=true
          for PR in $PRS; do
            MINOR=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq '.[] | select(.body | contains("pr-preview-minor-version=")) | .body' \
              | grep -o 'pr-preview-minor-version=[0-9]*' | tail -1 | cut -d= -f2)
            if [ -z "$MINOR" ]; then
              echo "::warning::PR #${PR} has no stored minor version, skipping"
              continue
            fi
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              VERSIONS+=","
            fi
            VERSIONS+="\"pr-${PR}\":${MINOR}"
          done
          VERSIONS+="}"
          echo "pr_versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Active PR preview versions to preserve: $VERSIONS"

  deploy:
    needs: resolve
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: staging
      apply: true
      release_version: ${{ needs.resolve.outputs.version }}
      pr_versions: ${{ needs.resolve.outputs.pr_versions }}
    secrets: inherit

  unit-tests:
    needs: [deploy, resolve]
    if: inputs.run_tests == true
    runs-on: AuthRunner
    environment: staging

    strategy:
      matrix:
        code_path: [MAMBU]

    env:
      ENVIRONMENT: staging
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      API_TEST_SECRET: ${{ secrets.API_TEST_SECRET_VALUE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      PINPOINT_PROJECT_ID: ${{ secrets.PINPOINT_PROJECT_ID }}
      CUSTOMER_TO_CARD_MAPPING_TABLE: "customer-to-card-mapping-staging"
      WORKFLOW_CODE_PATH: ${{ matrix.code_path }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm run test --outputFile=./test-results-unit-${{ matrix.code_path }}.xml

      - name: Publish Unit Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results-unit-${{ matrix.code_path }}.xml
          check_name: Unit Test Results (${{ matrix.code_path }})

  e2e-tests:
    needs: [deploy, resolve]
    if: inputs.run_e2e_tests == true
    runs-on: AuthRunner
    environment: staging

    strategy:
      matrix:
        code_path: [MAMBU]

    env:
      ENVIRONMENT: staging
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      API_TEST_SECRET: ${{ secrets.API_TEST_SECRET_VALUE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      PINPOINT_PROJECT_ID: ${{ secrets.PINPOINT_PROJECT_ID }}
      CUSTOMER_TO_CARD_MAPPING_TABLE: "customer-to-card-mapping-staging"
      WORKFLOW_CODE_PATH: ${{ matrix.code_path }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E Tests
        run: pnpm run test-e2e --outputFile=./test-results-e2e-${{ matrix.code_path }}.xml

      - name: Publish E2E Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results-e2e-${{ matrix.code_path }}.xml
          check_name: E2E Test Results (${{ matrix.code_path }})

      - name: Publish E2E Test Results (${{ matrix.code_path }})
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: E2E Test Results (${{ matrix.code_path }})
          path: test-results-e2e-${{ matrix.code_path }}.xml
          reporter: java-junit
          list-tests: none
          fail-on-error: false

  staging-complete:
    needs: [deploy, unit-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Mark staging complete on commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=success \
            -f context=staging-complete \
            -f description="Staging deploy and tests passed"
