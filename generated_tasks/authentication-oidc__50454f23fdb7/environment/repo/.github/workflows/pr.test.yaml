name: PR Preview Tests

on:
  pull_request:
    types: [labeled]

jobs:
  resolve:
    if: github.event.label.name == 'test'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      pr_ref: ${{ steps.pr.outputs.ref }}
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER)
          REF=$(echo "$PR_JSON" | jq -r .head.ref)
          LABELS=$(echo "$PR_JSON" | jq -r '.labels[].name')
          if ! echo "$LABELS" | grep -q "^preview$"; then
            echo "::error::PR #$PR_NUMBER does not have the 'preview' label — deploy a preview first"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

  unit-tests:
    needs: resolve
    runs-on: AuthRunner
    environment: staging
    env:
      ENVIRONMENT: staging
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      API_TEST_SECRET: ${{ secrets.API_TEST_SECRET_VALUE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      PINPOINT_PROJECT_ID: ${{ secrets.PINPOINT_PROJECT_ID }}
      CUSTOMER_TO_CARD_MAPPING_TABLE: "customer-to-card-mapping-staging"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm run test --outputFile=./test-results-unit.xml

      - name: Publish Unit Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results-unit.xml
          check_name: "Unit Test Results (PR Preview)"

  e2e-tests:
    needs: resolve
    runs-on: AuthRunner
    environment: staging
    env:
      ENVIRONMENT: staging
      E2E_API_VERSION: pr-${{ needs.resolve.outputs.pr_number }}
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      API_TEST_SECRET: ${{ secrets.API_TEST_SECRET_VALUE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      PINPOINT_PROJECT_ID: ${{ secrets.PINPOINT_PROJECT_ID }}
      CUSTOMER_TO_CARD_MAPPING_TABLE: "customer-to-card-mapping-staging"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E Tests
        run: pnpm run test-e2e --outputFile=./test-results-e2e.xml

      - name: Publish E2E Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results-e2e.xml
          check_name: "E2E Test Results (PR Preview)"

  comment:
    needs: [resolve, unit-tests, e2e-tests]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post test results comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
        run: |
          UNIT_ICON=$( [ "$UNIT_RESULT" = "success" ] && echo "✅" || echo "❌" )
          E2E_ICON=$( [ "$E2E_RESULT" = "success" ] && echo "✅" || echo "❌" )

          BODY=$(cat <<EOF
          ## PR Preview Tests

          | Suite | Result |
          |-------|--------|
          | Unit Tests | ${UNIT_ICON} ${UNIT_RESULT} |
          | E2E Tests | ${E2E_ICON} ${E2E_RESULT} |

          Tested against stage \`authentication-pr-${PR_NUMBER}\`

          Run by [PR Preview Tests](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )

          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq '.[] | select(.body | contains("PR Preview Tests")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH --field body="$BODY"
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
              --method POST --field body="$BODY"
          fi

  remove-test-label:
    needs: [resolve, unit-tests, e2e-tests]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove test label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ needs.resolve.outputs.pr_number }}/labels/test \
            --method DELETE
