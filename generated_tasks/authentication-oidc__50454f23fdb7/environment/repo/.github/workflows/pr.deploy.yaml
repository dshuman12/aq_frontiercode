name: PR Preview Deploy

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to deploy a preview for"
        required: true
        type: number

concurrency:
  group: staging-terraform
  cancel-in-progress: false

jobs:
  resolve:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'preview' ||
      github.event.label.name == 'refresh'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      pr_versions: ${{ steps.versions.outputs.pr_versions }}
      pr_ref: ${{ steps.pr.outputs.ref }}
      release_version: ${{ steps.version.outputs.release_version }}
      pr_minor_version: ${{ steps.version.outputs.minor_version }}
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          else
            PR_NUMBER=${{ inputs.pr_number }}
          fi

          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER)
          REF=$(echo "$PR_JSON" | jq -r .head.ref)
          STATE=$(echo "$PR_JSON" | jq -r .state)
          if [ "$STATE" != "open" ]; then
            echo "::error::PR #$PR_NUMBER is not open (state=$STATE)"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Add preview label (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/labels \
            --method POST --input - <<< '{"labels":["preview"]}'

      - name: Compute release version and minor version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha || github.sha }}" | cut -c1-7)
          MINOR=$(printf '%d' "0x${SHORT_SHA}")
          echo "release_version=${{ steps.pr.outputs.ref }}/${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "minor_version=${MINOR}" >> $GITHUB_OUTPUT

      - name: Build PR versions map
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_PR=${{ steps.pr.outputs.number }}
          CURRENT_MINOR=${{ steps.version.outputs.minor_version }}
          PRS=$(gh pr list --repo ${{ github.repository }} --label preview --state open --json number --jq '.[].number')
          VERSIONS="{"
          FIRST=true
          for PR in $PRS; do
            if [ "$PR" = "$CURRENT_PR" ]; then
              MINOR="$CURRENT_MINOR"
            else
              # Read stored minor version from the PR's deploy comment
              MINOR=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
                --jq '.[] | select(.body | contains("pr-preview-minor-version=")) | .body' \
                | grep -o 'pr-preview-minor-version=[0-9]*' | tail -1 | cut -d= -f2)
              if [ -z "$MINOR" ]; then
                echo "::warning::PR #${PR} has no stored minor version, skipping"
                continue
              fi
            fi
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              VERSIONS+=","
            fi
            VERSIONS+="\"pr-${PR}\":${MINOR}"
          done
          # Add current PR if not yet labelled
          if ! echo "$PRS" | grep -q "^${CURRENT_PR}$"; then
            echo "Current PR #${CURRENT_PR} not yet in search index, adding explicitly"
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              VERSIONS+=","
            fi
            VERSIONS+="\"pr-${CURRENT_PR}\":${CURRENT_MINOR}"
          fi
          VERSIONS+="}"
          echo "pr_versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Active PR preview versions: $VERSIONS"

  deploy:
    needs: resolve
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: staging
      apply: true
      pr_versions: ${{ needs.resolve.outputs.pr_versions }}
      ref: ${{ needs.resolve.outputs.pr_ref }}
      release_version: ${{ needs.resolve.outputs.release_version }}
    secrets: inherit

  comment:
    needs: [resolve, deploy]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview URL comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          BODY=$(cat <<EOF
          ## PR Preview Deployed

          | | |
          |---|---|
          | **URL** | \`https://auth.staging.onmo.app/oidc/pr-${{ needs.resolve.outputs.pr_number }}/\` |
          | **Tier** | API-only (Tier 1) |
          | **Stage** | \`authentication-pr-${{ needs.resolve.outputs.pr_number }}\` |
          | **Tests** | Add the \`test\` label to run unit + e2e tests |

          Event handlers, SQS consumers, and scheduled functions use shared staging code.

          To tear down: remove the \`preview\` label or close this PR.

          Deployed by [PR Preview Deploy](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          <!-- pr-preview-minor-version=${{ needs.resolve.outputs.pr_minor_version }} -->
          EOF
          )

          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq '.[] | select(.body | contains("PR Preview Deployed")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH --field body="$BODY"
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
              --method POST --field body="$BODY"
          fi

  remove-refresh-label:
    needs: [resolve, deploy]
    if: always() && github.event.label.name == 'refresh' && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove refresh label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ needs.resolve.outputs.pr_number }}/labels/refresh \
            --method DELETE
