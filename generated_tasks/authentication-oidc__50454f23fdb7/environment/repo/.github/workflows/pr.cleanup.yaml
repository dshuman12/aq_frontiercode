name: PR Preview Cleanup

on:
  pull_request:
    types: [closed, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to clean up (only needed for manual runs)"
        required: true
        type: number

concurrency:
  group: staging-terraform
  cancel-in-progress: false

jobs:
  cleanup:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      pr_versions: ${{ steps.versions.outputs.pr_versions }}
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Remove preview label
        if: github.event.action != 'unlabeled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/labels/preview \
            --method DELETE || true

      - name: Build remaining PR versions map
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_PR=${{ steps.pr.outputs.number }}
          PRS=$(gh pr list --repo ${{ github.repository }} --label preview --state open --json number --jq '.[].number')
          VERSIONS="{"
          FIRST=true
          for PR in $PRS; do
            if [ "$PR" = "$CURRENT_PR" ]; then
              echo "Skipping current PR #${PR} (just cleaned up)"
              continue
            fi
            MINOR=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq '.[] | select(.body | contains("pr-preview-minor-version=")) | .body' \
              | grep -o 'pr-preview-minor-version=[0-9]*' | tail -1 | cut -d= -f2)
            if [ -z "$MINOR" ]; then
              echo "::warning::PR #${PR} has no stored minor version, skipping"
              continue
            fi
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              VERSIONS+=","
            fi
            VERSIONS+="\"pr-${PR}\":${MINOR}"
          done
          VERSIONS+="}"
          echo "pr_versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Remaining PR preview versions: $VERSIONS"

  apply:
    needs: cleanup
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: staging
      apply: true
      pr_versions: ${{ needs.cleanup.outputs.pr_versions }}
      release_version: cleanup/${{ github.sha }}
    secrets: inherit

  comment:
    needs: [cleanup, apply]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.cleanup.outputs.pr_number }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq '.[] | select(.body | contains("PR Preview Deployed")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            BODY=$(cat <<'EOF'
          ## PR Preview Destroyed

          Preview environment for PR #${{ needs.cleanup.outputs.pr_number }} has been cleaned up.

          Cleaned up by [PR Preview Cleanup](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
            )

            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH --field body="$BODY"
          fi
