# ── Application Constants ──────────────────────────────────────────────────
# JS-only constants baked into Lambda bundles at build time.
# Not used by Terraform.

# ── Limits ─────────────────────────────────────────────────────────────────
limits:
  OTP_SEND_LIMIT: 3
  OTP_ATTEMPT_LIMIT: 3
  PASSCODE_ATTEMPT_LIMIT: 3
  CARD_SERVICE_TIMEOUT: 5000
  CARD_SERVICE_MAX_RETRIES: 2

# ── Status strings ─────────────────────────────────────────────────────────
statuses:
  COMPLETED_STATUS: "9_completed_status"
  OTP_SEND_LIMIT_REACHED: "OTP_SEND_LIMIT_REACHED"
  OTP_EXPIRED_SEND_LIMIT_REACHED: "OTP_EXPIRED_SEND_LIMIT_REACHED"
  OTP_EXPIRED_RESEND: "OTP_EXPIRED_RESEND"
  OTP_INVALID_ATTEMPT_LIMIT_REACHED: "OTP_INVALID_ATTEMPT_LIMIT_REACHED"
  OTP_INVALID_REATTEMPT: "OTP_INVALID_REATTEMPT"
  PASSCODE_INVALID_ATTEMPT_LIMIT_REACHED: "PASSCODE_INVALID_ATTEMPT_LIMIT_REACHED"
  PASSCODE_INVALID_REATTEMPT: "PASSCODE_INVALID_REATTEMPT"
  REFRESH_TOKEN_EXPIRED: "REFRESH_TOKEN_EXPIRED"

# ── Crypto ─────────────────────────────────────────────────────────────────
crypto:
  INTERATIONS: 100000
  KEY_LENGTH: 64
  DIGEST: "sha512"

# ── Auth flows ─────────────────────────────────────────────────────────────
auth_flows:
  OTP_AUTH_FLOW: "otp"
  OTP_PASSCODE_AUTH_FLOW: "otp_passcode"
  EXTRA_SCOPE_AUTH_FLOW: "extra_scope"
  FORGOTTEN_PASSCODE_LOGGED_IN_AUTH_FLOW: "forgotten_passcode_logged_in"
  FORGOTTEN_PASSCODE_LOGGED_OUT_AUTH_FLOW: "forgotten_passcode_logged_out"
  BIOMETRICS_REGISTRATION_AUTH_FLOW: "biometrics_registration"
  BIOMETRICS_AUTH_FLOW: "biometrics"

# ── Extra scope flows ─────────────────────────────────────────────────────
extra_scope_flows:
  EXTRA_SCOPE_OTP_PASSCODE_FLOW: "otp_passcode"
  EXTRA_SCOPE_PASSCODE_FLOW: "passcode"
  EXTRA_SCOPE_BIOMETRICS_FLOW: "biometrics"
  EMAIL_CHANGE_FLOW: "email_change"
  PHONE_NUMBER_CHANGE_FLOW: "phone_number_change"

# ── Login flows ────────────────────────────────────────────────────────────
login_flows:
  FIRST_TIME_LOGIN_FLOW: "first_time_login"
  RELOGIN_FLOW: "relogin"

# ── Login scenarios returned to app ───────────────────────────────────────
login_scenarios:
  LOGIN_SCENARIO_RELOGIN_RECOGNIZED_DEVICE: "relogin_recognized_device"
  LOGIN_SCENARIO_FIRST_TIME_NEW_DEVICE: "first_time_login_new_device"
  LOGIN_SCENARIO_FIRST_TIME_EXISTING_CUSTOMER: "first_time_login_existing_customer"
  LOGIN_SCENARIO_FIRST_TIME_NEW_CUSTOMER: "first_time_login_new_customer"

# ── Banking ────────────────────────────────────────────────────────────────
banking:
  SUPPORTED_CREDIT_ACCOUNT_STATES:
    - "ACTIVE"
    - "APPROVED"
    - "ACTIVE_IN_ARREARS"
    - "CLOSED"
    - "CLOSED_WRITTEN_OFF"
    - "FULL_LOCK"
    - "SPENDING_LOCK"
  CORE_BANKING_ADAPTER_CLIENT_NAME: "MAMBU_CLIENT"

# ── Token domains ─────────────────────────────────────────────────────────
token_domains:
  APP_TOKEN_DOMAIN: "app"
  WEB_TOKEN_DOMAIN: "web"

# ── HTTP status codes ─────────────────────────────────────────────────────
http:
  HTTP_OK: 200
  HTTP_UNAUTHORIZED: 401
  HTTP_RATELIMITTED: 429
  HTTP_SERVER_ERROR: 500
