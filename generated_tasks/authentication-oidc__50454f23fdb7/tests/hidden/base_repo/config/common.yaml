# ── Service ─────────────────────────────────────────────────────────────────
service:
  SERVICE_NAME: "authentication"
  REGION: "eu-west-1"
  BASE_PATH: "oidc"
  DISABLE_DEFAULT_ENDPOINT: true

# ── Auth Scopes ────────────────────────────────────────────────────────────
# Used by both JS (baked into bundle) and Terraform (SSM parameters, Lambda env vars)
scopes:
  APR_SCOPE: "apr"
  CLM_SCOPE: "clm"
  CUSTOMER_CARE_SCOPE: "customer-care"
  LOAN_ACCOUNT_ID_SCOPE: "loan-account-id"
  CREDIT_CARD_ACCOUNT_ID_SCOPE: "credit-card-account-id"
  CREDIT_CARD_ID_SCOPE: "credit-card-id"
  CUSTOMER_PROFILE_SCOPE: "customer-profile"
  SUPPORT_SERVICES_SCOPE: "support-services"
  AUTH_SERVICES_SCOPE: "auth-services"
  CREDIT_CARD_ACCOUNT_SCOPE: "credit-card-account"
  DIRECT_DEBIT_SCOPE: "direct-debit"
  DEBIT_CARD_ACCOUNT_SCOPE: "debit-card-account"
  CREDIT_CARD_DETAILS_SCOPE: "credit-card-details"
  CREDIT_CARD_ACTIVATION_SCOPE: "credit-card-activation"
  CREDIT_CARD_FREEZE_SCOPE: "credit-card-freeze"
  CREDIT_CARD_UNFREEZE_SCOPE: "credit-card-unfreeze"
  NAME_CHANGE_SCOPE: "name-change"
  EMAIL_ADDRESS_CHANGE_SCOPE: "email-address-change"
  MOBILE_NUMBER_CHANGE_SCOPE: "mobile-number-change"
  ADDRESS_CHANGE_SCOPE: "address-change"
  BIOMETRICS_CHANGE_SCOPE: "biometrics-change"
  PASSCODE_CHANGE_SCOPE: "passcode-change"
  REPAYMENT_SCOPE: "repayment"
  FIRST_TIME_LOGIN_SCOPE: "first-time-login"
  BIOMETRICS_CHECK_SCOPE: "biometrics-check"

# ── DynamoDB Tables (base names) ──────────────────────────────────────────
# Derived at consume time: base + "-" + ENVIRONMENT
tables:
  AUTH_TRANSACTIONS_TABLE: "auth-transactions"
  AUTH_CODES_TABLE: "auth-codes"
  AUTH_TOKENS_TABLE: "auth-tokens"
  AUTH_REFRESH_TOKENS_TABLE: "auth-refresh-tokens"
  AUTH_HASHES_TABLE: "auth-hashes"
  AUTH_KEYS_TABLE: "auth-keys"
  USER_TABLE: "mobile"
  LEGACY_AUTH_TABLE: "auth"
  LEGACY_RSA_TABLE: "authRSA"
  LEGACY_AUTH_BACKUP_TABLE: "auth-backup"
  LEGACY_RSA_BACKUP_TABLE: "authRSA-backup"
  APR_INCREASES_TABLE: "apr-increases"
  RATE_LIMITING_TABLE: "rate-limiting"

# ── SSM Parameters (base names) ──────────────────────────────────────────
# Derived at consume time: "/onmo/auth/" + ENVIRONMENT + "/" + base
params:
  NON_CONFLICTING_SCOPES_PARAM: "non_conflicting_scope_groups"
  EXCLUSIVE_SCOPES_PARAM: "exclusive_scopes"
  AUTH_FLOW_SCOPES_PARAM: "auth_flow_scopes"
  SCOPE_TO_RESOURCE_MAP_PARAM: "scope_to_resource_map"
  SCOPE_TO_RESOURCE_MAP_URL_PARAM: "scope_to_resource_map_url"
  TOKEN_LIFETIMES_PARAM: "token_lifetimes"
  STAFF_ONMOUUIDS_PARAM: "staff_onmouuids"
  APP_TESTER_LOGIN_CONFIG: "app_tester_login_config"

# ── Secrets (base names) ─────────────────────────────────────────────────
# Derived at consume time: base + "-" + ENVIRONMENT
secrets:
  NOTIFICATIONS_SFMC_SECRET_NAME: "salesforce-marketing-cloud"
  CARD_SERVICE_SECRET_NAME: "onmo-service-layer"
  POSTHOG_SECRET_NAME: "onmo-posthog"
  POSTHOG_SECRET_ARN: "onmo-posthog"

# ── PostHog ───────────────────────────────────────────────────────────────
posthog:
  POSTHOG_NOTIFICATION_FLAG_KEY: "2025_11_26_notifications_sfmc"
  POSTHOG_HAL_FLAG_KEY: "hal-customer-selection"

# ── SFMC (shared config) ─────────────────────────────────────────────────
sfmc:
  NOTIFICATIONS_SFMC_TOKEN_URL: "https://mcpck065n3wkw034w95dx55zfzh1.auth.marketingcloudapis.com/v2/token"
  NOTIFICATIONS_SFMC_COMMS_URL: "https://mcpck065n3wkw034w95dx55zfzh1.rest.marketingcloudapis.com/interaction/v1/events"
  NOTIFICATIONS_SFMC_GRANT_TYPE: "client_credentials"

# ── Gateway IDs (shared) ─────────────────────────────────────────────────
gateways:
  API_BROKER_GATEWAY_ID: "5hbms0mi39"
