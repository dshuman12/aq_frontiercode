name: Prod Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Type of Release"
        type: choice
        required: false
        options:
          - Select...
          - Update
          - Feature
          - Breaking Change

permissions:
  contents: write

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  release_version:
    runs-on: ubuntu-latest
    env:
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_new_release: ${{ steps.version.outputs.is_new_release }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Find/Create Deployment Version
        id: version
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            echo "Deploying from existing tag: $tag"
            echo "is_new_release=false" >> "$GITHUB_OUTPUT"
          else
            release_type="${{ inputs.bump }}"
            case "$release_type" in
              "Update")          bump="patch" ;;
              "Feature")         bump="minor" ;;
              "Breaking Change") bump="major" ;;
              *) echo "Please select a release type"; exit 1 ;;
            esac

            latest="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1 || true)"

            if [[ -z "$latest" ]]; then
              version="1.0.0"
            else
              version="$(pnpm dlx semver "${latest#v}" -i "$bump")"
            fi

            tag="v${version}"
            echo "Latest tag: ${latest:-<none>}"
            echo "Next tag:   $tag"
            echo "is_new_release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  notify_start:
    needs: release_version
    runs-on: ubuntu-latest
    outputs:
      message-ts: ${{ steps.slack.outputs.message-ts }}
      channel-id: ${{ steps.slack.outputs.channel-id }}
      start-time: ${{ steps.slack.outputs.start-time }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notify Slack — deploy started
        id: slack
        uses: ./.github/actions/slack-deploy-notify
        with:
          status: started
          version: ${{ needs.release_version.outputs.version }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}

  deploy:
    needs: [release_version, notify_start]
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: prod
      apply: true
      release_version: ${{ needs.release_version.outputs.version }}
    secrets: inherit

  release:
    needs: [release_version, deploy]
    if: needs.release_version.outputs.is_new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.release_version.outputs.tag }}" \
            --title "${{ needs.release_version.outputs.tag }}" \
            --generate-notes

  notify_result:
    needs: [release_version, notify_start, deploy, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine overall status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "failure" ] || [ "${{ needs.release.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "cancelled" ] || [ "${{ needs.release.result }}" = "cancelled" ]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack — deploy result
        if: needs.notify_start.outputs.message-ts
        uses: ./.github/actions/slack-deploy-notify
        with:
          status: ${{ steps.status.outputs.result }}
          version: ${{ needs.release_version.outputs.version }}
          release-tag: ${{ needs.release_version.outputs.tag }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          message-ts: ${{ needs.notify_start.outputs.message-ts }}
          channel-id: ${{ needs.notify_start.outputs.channel-id }}
          start-time: ${{ needs.notify_start.outputs.start-time }}
