      TF_VAR_NOTIFICATIONS_SFMC_TOKEN_URL: "https://mcpck065n3wkw034w95dx55zfzh1.auth.marketingcloudapis.com/v2/token"
      TF_VAR_NOTIFICATIONS_SFMC_COMMS_URL: "https://mcpck065n3wkw034w95dx55zfzh1.rest.marketingcloudapis.com/interaction/v1/events"
