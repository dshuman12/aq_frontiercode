      TF_VAR_POSTHOG_SECRET_NAME: "onmo-posthog-prod"
      TF_VAR_POSTHOG_NOTIFICATION_FLAG_KEY: "2025_11_26_notifications_sfmc"

      # AUTH SCOPES
      TF_VAR_APR_SCOPE: "apr"
      TF_VAR_CLM_SCOPE: "clm"
      TF_VAR_CUSTOMER_CARE_SCOPE: "customer-care"
      TF_VAR_LOAN_ACCOUNT_ID_SCOPE: "loan-account-id" # TODO: deprecate when not in use & replaced with credit-card-account-id
      TF_VAR_CREDIT_CARD_ACCOUNT_ID_SCOPE: "credit-card-account-id"
      TF_VAR_CREDIT_CARD_ID_SCOPE: "credit-card-id"
      TF_VAR_CUSTOMER_PROFILE_SCOPE: "customer-profile"
      TF_VAR_SUPPORT_SERVICES_SCOPE: "support-services"
      TF_VAR_AUTH_SERVICES_SCOPE: "auth-services"
      TF_VAR_CREDIT_CARD_ACCOUNT_SCOPE: "credit-card-account"
      TF_VAR_DIRECT_DEBIT_SCOPE: "direct-debit"
      TF_VAR_DEBIT_CARD_ACCOUNT_SCOPE: "debit-card-account"
      TF_VAR_CREDIT_CARD_DETAILS_SCOPE: "credit-card-details"
      TF_VAR_CREDIT_CARD_ACTIVATION_SCOPE: "credit-card-activation"
      TF_VAR_CREDIT_CARD_FREEZE_SCOPE: "credit-card-freeze"
      TF_VAR_CREDIT_CARD_UNFREEZE_SCOPE: "credit-card-unfreeze"
      TF_VAR_NAME_CHANGE_SCOPE: "name-change"
      TF_VAR_EMAIL_ADDRESS_CHANGE_SCOPE: "email-address-change"
      TF_VAR_MOBILE_NUMBER_CHANGE_SCOPE: "mobile-number-change"
      TF_VAR_ADDRESS_CHANGE_SCOPE: "address-change"
      TF_VAR_BIOMETRICS_CHANGE_SCOPE: "biometrics-change"
      TF_VAR_PASSCODE_CHANGE_SCOPE: "passcode-change"
      TF_VAR_REPAYMENT_SCOPE: "repayment"
      TF_VAR_FIRST_TIME_LOGIN_SCOPE: "first-time-login"

      # TEST SCOPES
      TF_VAR_TEST_OTP_STEP_EXTRA_SCOPE: "test-otp-step"
      TF_VAR_TEST_BIOMETRICS_STEP_EXTRA_SCOPE: "test-biometrics-step"

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Bundle Lambda Handlers
        run: |
          for category in src/functions/*; do
            category_name=$(basename -- "$category")
            for folder in "$category"/*; do
              folder_name=$(basename -- "$folder")
              file="$folder/$folder_name.ts"
              if [ -f "$file" ]; then
                npx esbuild $file --bundle --platform=node --target=node20 --outdir=./build/$category_name/$folder_name --external:@aws-sdk/*
              fi
            done
          done
        working-directory: .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.4
          cli_config_credentials_token: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="bucket=onmo-terraform-state-prod" \
            -backend-config="key=${{ env.TF_VAR_SERVICE_NAME }}/state-file-prod.tfstate" \
            -backend-config="dynamodb_table=onmo-terraform-state-prod" \
            -backend-config="region=${{ env.TF_VAR_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
