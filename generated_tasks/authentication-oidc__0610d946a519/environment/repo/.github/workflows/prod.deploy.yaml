      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      STAGE: "prod"

      TF_VAR_DATADOG_API_KEY: ${{ secrets.DATADOG_PLATFORM_API_KEY }}
      TF_VAR_DATADOG_APP_KEY: ${{ secrets.DATADOG_PLATFORM_SERVICE_APP_KEY }}
      TF_VAR_GITHUB_REPO: ${{ github.repository }}
      TF_VAR_SLACK_CHANNEL: "alerts-prod"

