      TF_VAR_APR_INCREASES_TABLE: "apr-increases-staging"
      TF_VAR_CUSTOMER_TO_CARD_MAPPING_TABLE: "customer-to-card-mapping-staging"
      TF_VAR_RATE_LIMITING_TABLE: "rate-limiting-staging"
      TF_VAR_PINPOINT_PROJECT_ID: ${{ secrets.PINPOINT_PROJECT_ID }}
