      TF_VAR_NOTIFICATIONS_SFMC_TOKEN_URL: "https://mcpck065n3wkw034w95dx55zfzh1.auth.marketingcloudapis.com/v2/token"
      TF_VAR_NOTIFICATIONS_SFMC_COMMS_URL: "https://mcpck065n3wkw034w95dx55zfzh1.rest.marketingcloudapis.com/interaction/v1/events"
      TF_VAR_NOTIFICATIONS_SFMC_GRANT_TYPE: "client_credentials"
      TF_VAR_NOTIFICATIONS_SFMC_CLIENT_ID: "kqz20iywus87y26wiy1oi0li"
      TF_VAR_NOTIFICATIONS_SFMC_ACCOUNT_ID: "536008172"
      TF_VAR_NOTIFICATIONS_SFMC_EVENT_KEY_OTP: "APIEvent-921968bb-81a4-0488-0413-8c075fc61633"

      TF_VAR_POSTHOG_SECRET_NAME: "onmo-posthog-staging"
      TF_VAR_POSTHOG_SECRET_ARN: "onmo-posthog-staging" #TODO: update onmo-client and standardise
      TF_VAR_POSTHOG_NOTIFICATION_FLAG_KEY: "2025_11_26_notifications_sfmc"
      TF_VAR_POSTHOG_HAL_FLAG_KEY: "hal-customer-selection"

      # TEST SCOPES
      TF_VAR_TEST_OTP_STEP_EXTRA_SCOPE: "test-otp-step"
      TF_VAR_TEST_BIOMETRICS_STEP_EXTRA_SCOPE: "test-biometrics-step"
      TF_VAR_QA_BYPASS_CUSTOMER_IDS: "48a5ceb1-8ae5-4bdb-b9bc-7f3995986c77,df7797cc-f77f-423d-a9f1-b0b5f719eddf,7b674668-25df-4045-a76f-5760ba93621d"

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Bundle Lambda Handlers
        run: |
          for category in src/functions/*; do
            category_name=$(basename -- "$category")
            for folder in "$category"/*; do
              folder_name=$(basename -- "$folder")
              file="$folder/$folder_name.ts"
              if [ -f "$file" ]; then
                npx esbuild $file --bundle --platform=node --target=node20 --outdir=./build/$category_name/$folder_name --external:@aws-sdk/*
              fi
            done
          done
        working-directory: .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.4
          cli_config_credentials_token: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="bucket=onmo-terraform-state-staging" \
            -backend-config="key=${{ env.TF_VAR_SERVICE_NAME }}/state-file-staging.tfstate" \
            -backend-config="dynamodb_table=onmo-terraform-state-staging" \
            -backend-config="region=${{ env.TF_VAR_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Unlock
        if: inputs.unlock != ''
        run: terraform force-unlock -force ${{inputs.unlock}}

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' || inputs.apply_changes == true
        run: terraform apply -auto-approve -input=false tfplan

      - name: Run Target API Tests
        if: inputs.run_target_tests == true
        run: npm run test-targets

      - name: Run E2E API Tests
        if: inputs.run_e2e_tests == true
        run: npm run test-e2e

      - name: Run API Tests
        if: inputs.run_tests == true
        run: npm run test

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
          check_name: Vitest Results
