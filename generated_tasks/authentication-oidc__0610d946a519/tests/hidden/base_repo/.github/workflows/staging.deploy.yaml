name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      plan_changes:
        description: "Plan Terraform Changes"
        required: true
        type: boolean
        default: false
      apply_changes:
        description: "Apply Terraform Changes"
        required: true
        type: boolean
        default: false
      run_target_tests:
        description: "Run Target Tests"
        required: true
        type: boolean
        default: true
      run_tests:
        description: "Run Tests"
        required: true
        type: boolean
        default: true
      run_e2e_tests:
        description: "Run E2E Tests"
        required: true
        type: boolean
        default: true
      unlock:
        description: TF Unlock
        type: string
  push:
    branches:
      - main

jobs:
  check_for_updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  staging_deploy:
    needs: check_for_updates
    environment: staging
    env:
      AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.ONMO_PROD_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.ONMO_PROD_AWS_SECRET_ACCESS_KEY }}
      ONMO_REGISTRY_PACKAGES: ${{ secrets.ONMO_REGISTRY_PACKAGES }}
      API_TEST_SECRET: ${{ secrets.API_TEST_SECRET_VALUE }}

      TF_VAR_DATADOG_API_KEY: ${{ secrets.DATADOG_PLATFORM_API_KEY }}
      TF_VAR_DATADOG_APP_KEY: ${{ secrets.DATADOG_PLATFORM_SERVICE_APP_KEY }}
      TF_VAR_GITHUB_REPO: ${{ github.repository }}
      TF_VAR_SLACK_CHANNEL: "datadog-alert-testing"
      TF_VAR_ALERT_EMAIL_LIST: '["bhavin.bavaria@elevationservices.co.uk", "joe.kadi@onmo.app"]'

      # SERVICE CONFIG
      TF_VAR_AWS_ACCOUNT_ID: ${{ secrets.ONMO_PROD_AWS_ACCOUNT_ID }}
      TF_VAR_SERVICE_NAME: "authentication"
      TF_VAR_ENVIRONMENT: "staging"
      TF_VAR_REGION: "eu-west-1"

      # GATEWAY CONFIG
      TF_VAR_DISABLE_DEFAULT_ENDPOINT: true
      TF_VAR_THROTTLING_BURST_LIMIT: 200
      TF_VAR_THROTTLING_RATE_LIMIT: 75
      TF_VAR_CUSTOM_DOMAIN_NAMES: '["auth.staging.onmo.app"]'
      TF_VAR_WEB_ACL_ARN: ${{ secrets.STAGING_WEB_ACL_ARN }}
      TF_VAR_BASE_PATH: "oidc"

      # LAMBDA ENVIRONMENT VARIABLES
      TF_VAR_AUTH_TRANSACTIONS_TABLE: "auth-transactions-staging"
      TF_VAR_AUTH_CODES_TABLE: "auth-codes-staging"
      TF_VAR_AUTH_TOKENS_TABLE: "auth-tokens-staging"
      TF_VAR_AUTH_REFRESH_TOKENS_TABLE: "auth-refresh-tokens-staging"
      TF_VAR_AUTH_HASHES_TABLE: "auth-hashes-staging"
