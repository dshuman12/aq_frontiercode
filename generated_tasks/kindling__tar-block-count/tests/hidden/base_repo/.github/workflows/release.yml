name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build release
        run: |
          mkdir -p out
          GOOS=linux GOARCH=amd64 go build -o out/kindling-linux-amd64 ./cmd/kindling
          GOOS=linux GOARCH=arm64 go build -o out/kindling-linux-arm64 ./cmd/kindling
          GOOS=darwin GOARCH=amd64 go build -o out/kindling-darwin-amd64 ./cmd/kindling
          GOOS=darwin GOARCH=arm64 go build -o out/kindling-darwin-arm64 ./cmd/kindling
          ( cd out && sha256sum kindling-* > SHA256SUMS )
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/kindling-*
            out/SHA256SUMS
          fail_on_unmatched_files: true
