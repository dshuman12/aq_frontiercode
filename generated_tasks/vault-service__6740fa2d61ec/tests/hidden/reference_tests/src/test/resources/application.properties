spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:test-vault;MODE=MSSQLServer
spring.datasource.username=vault
spring.datasource.password=vault

vault.service.isLegacyCloud=false

vault.service.baseUrl=https://ws-vault.test.gaptech.com/
vault.service.username=test-username
vault.service.password=test-password

vault.service.retries=3
vault.service.waitInMillis=100
vault.service.connectTimeoutInMillis=5000
vault.service.readTimeoutInMillis=5000
vault.service.checkoutConnectionFromPoolTimeoutInMillis=5000
vault.service.maxConnections=100
vault.service.maxConnectionPerRoute=10
vault.service.previewBaseUrl=https://ws-vault-preview.stage.gaptech.com/
vault.service.previewUserName=test-preview-username
vault.service.previewPassword=test-preview-password
vault.service.previewMaxConnections=10

ingrian.configfile=/IngrianNAE.properties
vaultserver.configfile=/vaultserver.properties

spring.config.import=application-voltage.properties

bluefin.host=http://localhost:9091
bluefin.tokenizePath=/api/tokenization/tokenize
bluefin.deTokenizePath=/api/tokenization/detokenize
bluefin.bulkTokenizePath=/api/tokenization/batch/tokenize
bluefin.bulkDeTokenizePath=/api/tokenization/batch/detokenize
bluefin.partnerId=partner-id
bluefin.partnerKey=partner-key


#polling time is in milliseconds
vault.service.pollingTime = 60000
vault.service.azure_db_timeout=20

# RestTemplate configuration
restTemplate.connectTimeOut=1000
restTemplate.tokenizeTimeOut=50
restTemplate.detokenizeTimeOut=50
restTemplate.bulkTokenizeTimeOut=80
restTemplate.bulkDetokenizeTimeOut=80

#Connection Pool Configuration
restTemplate.httpClientsMaxConnTotal=80
restTemplate.httpClientsMaxConnPerRoute=20
restTemplate.httpClientsValidateAfterInactivity=2000
restTemplate.httpClientsCheckoutConnTimeout=5000

# Resiliece4j Retry Configuration
resilience4j.retry.instances.bluefin-client-tokenize.max-attempts=3
resilience4j.retry.instances.bluefin-client-tokenize.wait-duration=10ms
resilience4j.retry.instances.bluefin-client-tokenize.enable-exponential-backoff=true
resilience4j.retry.instances.bluefin-client-tokenize.exponential-backoff-multiplier=2
resilience4j.retry.instances.bluefin-client-tokenize.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.net.UnknownHostException

resilience4j.retry.instances.bluefin-client-detokenize.max-attempts=3
resilience4j.retry.instances.bluefin-client-detokenize.wait-duration=10ms
resilience4j.retry.instances.bluefin-client-detokenize.enable-exponential-backoff=true
resilience4j.retry.instances.bluefin-client-detokenize.exponential-backoff-multiplier=2
resilience4j.retry.instances.bluefin-client-detokenize.retry-exceptions=org.springframework.web.client.ResourceAccessException


resilience4j.retry.instances.db-retry-azure.max-attempts=3
resilience4j.retry.instances.db-retry-azure.wait-duration=10ms
resilience4j.retry.instances.db-retry-azure.enable-exponential-backoff=true
resilience4j.retry.instances.db-retry-azure.exponential-backoff-multiplier=2
resilience4j.retry.instances.db-retry-azure.retry-exceptions=com.gap.customer.vaultservice.exception.VaultServiceException,java.util.concurrent.TimeoutException