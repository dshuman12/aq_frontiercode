apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthbridge-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: healthbridge-api
  template:
    metadata:
      labels:
        app: healthbridge-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
