version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
