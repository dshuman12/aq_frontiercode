  commit_subject: "fix(bipartite): raise ValueError on conflicting colors, not matching colors"
  reference_test_files: ["tests/test_bipartite_fix.py"]
criteria:
  - id: hidden_reference_tests_pass
    category: patch_specific
    description: >
      Hidden behavioral tests extracted from the source fix pass after the submitted patch.
      Reference test files: tests/test_bipartite_fix.py.
    method: classical
    blocker: true
    weight: 0.35
    command: python3 tests/hidden/run_criteria.py --criterion hidden_reference_tests_pass environment/repo
    timeout_seconds: 600
  - id: submitted_tests_fail_on_base
    category: regular
    description: >
      Submitted visible tests capture the task behavior because they fail against
      the original broken base snapshot before the implementation change.
    method: reverse_classical
    blocker: true
    weight: 0.15
    command: python3 tests/hidden/run_criteria.py --criterion submitted_tests_fail_on_base environment/repo
    timeout_seconds: 600
  - id: visible_regression_tests_pass
    category: regular
    description: >
      The repository's visible regression workflow still passes after the submitted patch.
      Generated command: python -m pytest tests/ -x -q.
    method: command
    blocker: true
    weight: 0.20
    command: python3 tests/hidden/run_criteria.py --criterion visible_regression_tests_pass environment/repo
    timeout_seconds: 600
  - id: scope_matches_reference_intent
    category: regular
    description: >
      The patch stays within the feature and test areas implicated by the source fix commit,
      avoiding unrelated rewrites or broad file churn.
    method: scope
    blocker: true
    weight: 0.15
    scope:
      allowed_paths: ["meridian/analysis/", "meridian/analysis/bipartite.py", "tests/", "tests/test_bipartite_fix.py"]
      denied_paths: []
      max_files: 6
      max_changed_lines: 250
  - id: no_hidden_asset_leak
    category: regular
    description: >
      The agent-visible repository does not contain generated hidden tests, grader assets,
      reference patches, or fix commit identifiers.
    method: command
    blocker: true
    weight: 0.05
    command: python3 tests/hidden/run_criteria.py --criterion no_hidden_asset_leak environment/repo
  - id: behavior_core_requirement
    category: patch_specific
    description: >
      The submitted patch satisfies the central maintainer request, not just the narrow
      visible test command.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the diff fully resolves this task for meridian: bipartite_sets and
      two_color raise ValueError for valid bipartite graphs and silently accept graphs
      containing odd cycles. The 2-coloring check compares neighbor colors with the wrong
      operator, so conflict detection fires when the two sides have different colors (which is
      the expected state) and misses the actual error case of same-colored neighbors. Fix the
      coloring validation so that ValueError is raised on odd cycles and valid bipartite
      graphs are processed correctly.
  - id: behavior_edge_cases
    category: patch_specific
    description: >
      The implementation handles edge cases naturally implied by the task and affected code
      paths.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the diff handles realistic edge cases around
      meridian/analysis/bipartite.py while preserving the requested behavior.
  - id: behavior_error_handling
    category: patch_specific
    description: >
      The change preserves or improves existing error handling instead of masking failures.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the diff keeps failure modes explicit and maintainable for the task
      behavior in meridian.
  - id: behavior_backward_compatibility
    category: regular
    description: >
      Existing public behavior and compatibility constraints remain intact outside the
      requested fix.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the diff avoids breaking existing documented behavior, public APIs, file
      formats, or command-line contracts.
  - id: regression_visible_tests_meaningful
    category: regular
    description: >
      Visible regression tests exercise the requested behavior rather than only checking
      superficial execution.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the submitted tests make python -m pytest tests/ -x -q meaningfully
      validate the requested behavior.
  - id: regression_reference_area_preserved
    category: patch_specific
    description: >
      The fix covers behavior in the same functional area as the extracted reference tests.
    method: llm_prompt
    blocker: false
    weight: 0.02
