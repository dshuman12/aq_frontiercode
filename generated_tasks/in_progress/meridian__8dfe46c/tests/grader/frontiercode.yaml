      Score whether the diff addresses the behavior covered by these inferred test areas:
      tests/test_bipartite_fix.py.
  - id: test_coverage_positive_path
    category: regular
    description: >
      Tests cover at least one successful or expected-use path for the new behavior.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the patch includes or preserves clear positive-path coverage for the
      requested behavior.
  - id: test_coverage_negative_path
    category: regular
