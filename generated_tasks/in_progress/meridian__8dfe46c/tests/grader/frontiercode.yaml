  - id: test_integration_with_existing_workflow
    category: regular
    description: >
      New or edited tests are integrated into the repository's normal test workflow.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether tests are wired into the existing project workflow so python -m pytest
      tests/ -x -q or the documented test command runs them.
  - id: scope_minimal_patch
    category: regular
    description: >
      The patch is focused and avoids unrelated rewrites, broad churn, or cosmetic-only edits.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
