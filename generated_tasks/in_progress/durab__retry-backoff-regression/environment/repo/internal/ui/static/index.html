<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>durab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>durab</h1>
  <span id="status">…</span>
</header>

<section id="start">
  <h2>start</h2>
  <form id="start-form">
    <label>id <input name="id" required></label>
    <label>type <input name="type" required></label>
    <label>queue <input name="queue" value="default"></label>
    <label>input
      <textarea name="input" rows="3" placeholder='{"key":"value"} (optional)'></textarea>
    </label>
    <button type="submit">start</button>
  </form>
  <pre id="start-result"></pre>
</section>

<section id="runs">
  <h2>workflows</h2>
  <div class="row">
    <button id="refresh">refresh</button>
    <label>status
      <select id="filter-status">
        <option value="">any</option>
        <option>running</option>
        <option>completed</option>
        <option>failed</option>
        <option>canceled</option>
        <option>terminated</option>
        <option>timed_out</option>
      </select>
    </label>
  </div>
  <table id="runs-table">
    <thead><tr><th>workflow</th><th>run</th><th>type</th><th>queue</th><th>status</th><th>started</th></tr></thead>
    <tbody></tbody>
  </table>
</section>

<script src="app.js"></script>
</body>
</html>
