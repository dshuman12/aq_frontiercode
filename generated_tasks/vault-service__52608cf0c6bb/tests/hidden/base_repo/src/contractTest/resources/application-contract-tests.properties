server.port=9100

# LOG
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b "%{Referer}i" "%{User-Agent}i" "%{X-Forwarded-For}i" "%{X-Forwarded-Proto}i" "%{X-App-Name}i"
server.tomcat.accesslog.enabled=true

vault.service.isLegacyCloud=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
#
vault.service.baseUrl=https://ws-vault.test.gaptech.com/
vault.service.retries=3
vault.service.waitInMillis=100
vault.service.connectTimeoutInMillis=5000
vault.service.readTimeoutInMillis=5000
vault.service.checkoutConnectionFromPoolTimeoutInMillis=5000
vault.service.maxConnections=100
vault.service.maxConnectionPerRoute=10
vault.service.previewBaseUrl=https://ws-vault-preview.stage.gaptech.com/
vault.service.previewMaxConnections=10

#polling time is in milliseconds
vault.service.pollingTime = 60000

spring.cloud.bootstrap.enabled=true

#SPRINGFOX SWAGGER
springfox.documentation.swagger.version=1.0
springfox.documentation.swagger.title=Vault Service
springfox.documentation.swagger.description=Vault service to manage vault ids.
springfox.documentation.swagger.contactName=Profile Team
springfox.documentation.swagger.contactUrl=http://www.gap.com
springfox.documentation.swagger.contactEmail=HQ-GAPTECH-PROFILE-DG@gap.com
springfox.documentation.swagger.host=test.api.gaptech.com
springfox.documentation.swagger.path=commerce/vault
springfox.documentation.swagger.v2.path=/api-docs
springdoc.swagger-ui.url=swagger-vault-new.json

#Used for enabling Actuator Endpoints.
management.endpoints.web.exposure.include=health,loggers,info
management.health.defaults.enabled=false
spring.cloud.discovery.client.composite-indicator.enabled=false
management.endpoint.health.show-details=always

ingrian.configfile=/IngrianNAE.properties
vaultserver.configfile=/vaultserver.properties

#Resiliance retry config properties for Azure
resilience4j.retry.instances.db-retry-azure.max-attempts=3
resilience4j.retry.instances.db-retry-azure.wait-duration=10ms
resilience4j.retry.instances.db-retry-azure.enable-exponential-backoff=true
resilience4j.retry.instances.db-retry-azure.exponential-backoff-multiplier=2
resilience4j.retry.instances.db-retry-azure.retry-exceptions=com.gap.customer.vaultservice.exception.VaultServiceException,java.util.concurrent.TimeoutException