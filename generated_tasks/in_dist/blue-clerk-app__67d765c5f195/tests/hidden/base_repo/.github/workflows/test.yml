name: Run All Tests
on:
    pull_request:
        branches: 
            - main
            - staging
            - test

jobs:
    run-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: set up Node.js
              uses: actions/setup-node@v2
              with: 
                node-version: '18'
            - name: Install Dependecies
              run: yarn install
            - name: Add nyc package
              run: yarn add nyc --dev
            - name: Run Tests
              run: npm test     
              continue-on-error: true