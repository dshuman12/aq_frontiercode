                  type: boolean
                  description: Mark the invoice as draft, default to true for new invoice
                  enum:
                    - true
                    - false
                paymentTermId:
                  type: string
                  description: Pass payment term id
                estimateId:
                  type: string
                  description: Pass estimate id to create estimate invoice (optional)
                customerPO:
                  type: string
                  description: Pass customer PO to replace ticket's customer PO if any (optional)
                customerContactId:
                  type: string
                  description: Pass customer contact id to replace ticket's customer contact id if any (optional)
                vendorId:
                  type: string
                  description: Pass customer vendor id to replace the default customer's vendor id (optional)
                customerId:
                  type: string
                  description: Pass customer id to create invoice
                note:
                  type: string
                  description: Pass note for invoice
                shippingCost:
                  type: number
                  description: Shipping cost (optional)
                charges:
                  type: number
                  description: Charges if you want to change the charge amount for the invoice
                timeSpent:
                  type: number
                  description: No of hours spend on that job pass default from finished job if you dont want to change
                includePO:
                  type: boolean
                  description: select if you want to include purchase orders linked to this job in this invoice
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
