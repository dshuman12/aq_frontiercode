components:
  schemas:
    ContactSchemaResponse:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
    jobReportSchema:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/Job'
        scans:
          type: array
          items:
            $ref: '#/components/schemas/Scan'
        PurchaseOrder:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrder'
        company:
          $ref: '#/components/schemas/company'
        invoice:
          $ref: '#/components/schemas/Invoice'
    getAllJobReportsResponseSchema:
      type: array
      items:
        $ref: '#/components/schemas/jobReportSchema'
    company:
      type: object
      properties:
        status:
          type: integer
        company:
          type: object
          properties:
            info:
              type: object
              properties:
                companyName:
                  type: string
                industry:
                  type: string
                logoUrl:
                  type: string
                companyEmail:
                  type: string
            address:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                state:
                  type: string
                zipCode:
                  type: string
            contact:
              type: object
              properties:
                phone:
                  type: string
            other:
              type: object
              properties:
                hasCardOnFile:
                  type: boolean
            userPermissions:
              type: object
              properties: {}
    CompanyInvoice:
      type: object
      properties:
        _id:
          type: string
        technicians:
          type: string
          description: number of technicians
        managers:
          type: string
          description: number of managers
        officeAdmins:
          type: string
          description: number of office admins
        admins:
          type: string
          description: number of admins
        contractors:
          type: string
          description: number of contractors
        company:
          $ref: '#/components/schemas/company'
        charges:
          type: number
          description: Charges amount from job or if you have customized while creating invoice
        tax:
          type: number
          description: Tax amount to be added in charges to calculate the total invoice
        total:
          type: number
          description: Total amount to be charged to customer
        createdAt:
          type: string
          description: Date time when the invoice was created
          format: date-time
        emailHistory:
          type: array
          items:
            type: object
            properties:
              sentTo:
                type: string
              sentAt:
                type: string
    Industry:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
    User:
      type: object
      properties:
        _id:
          type: string
        auth:
          type: object
          properties:
            email:
              type: string
            password:
              type: string
