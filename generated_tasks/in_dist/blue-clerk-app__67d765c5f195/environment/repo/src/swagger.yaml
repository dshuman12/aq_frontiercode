            contact:
              type: object
              properties:
                phone:
                  type: string
                  description: Phone number of company
            permissions:
              type: object
              properties:
                role:
                  type: string
            address:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                state:
                  type: string
                zipCode:
