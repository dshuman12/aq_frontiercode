openapi: 3.0.3
info:
  title: BlueClerk
  description: APIs for both app and website
  version: 2.3.0
servers: []
tags:
  - name: Auth
    description: For login and signup
  - name: Social Auth
    description: For social login and signup
  - name: Industry
    description: For the industry company works in
  - name: Users
    description: For all kind of users
  - name: Company
    description: For all kind of company stuff
  - name: Company Location
    description: For all kind of company location stuff
  - name: Email Default
    description: For all kind of company email default
  - name: Equipment Type
    description: For equipment types
  - name: Equipment Brand
    description: For equipment brands
  - name: Customer
    description: For customers of a company
  - name: Customer Equipment
    description: For equipments of a customer
  - name: Contact
    description: For contact of customer or job location
  - name: Location Tags
    description: For location tags
  - name: Customer Equipment Detail
    description: For Limited information of customer equipment and jobs
  - name: Company Equipment
  - name: Company Card
    description: For payment methods of a company
  - name: Company Equipment History
    description: For company equipment's Check In Check Out history
  - name: Inventory
    description: For Inventory of company equipments
  - name: Subdivision
    description: For company Subdivision (formerly Job Location)
  - name: Job Address
    description: For adding, updating and fetching Job Address detail (formerly Job Site)
  - name: Job Type
    description: For job types
  - name: Items
    description: For invoice items
  - name: Item Pricing Tiers
    description: For company item pricing tiers
  - name: Discount Item
    description: For customer custom discount pricing
  - name: Job Charges
    description: For job charges
  - name: Service Ticket
    description: For creating and getting service tickets
  - name: Job Request
    description: For job requests
  - name: Job
    description: For scheduled jobs
  - name: Job Route
    description: For job routing
  - name: Part Inventory
    description: For parts inventory
  - name: Purchase Order
    description: For company purchase orders
  - name: Estimate
    description: For Estimate
  - name: Job Report
    description: For job and other reports
  - name: Sales Tax
    description: For salesTax
  - name: Invoice
    description: For invoices of jobs
  - name: Payment Term
    description: For payment terms of invoices
  - name: Payment
    description: For payments of invoices
  - name: Advance Payment
    description: For advance payments
  - name: Report
    description: For all reports
  - name: Memorized Report
    description: For all memorized reports
  - name: Image
    description: For images
  - name: Group
    description: For Groups
  - name: Tags
    description: For Placing Tags Order
  - name: Subscription
  - name: Chat
    description: For create and retrieving chats
  - name: Notification
    description: For retrieving and updating notifications
  - name: Permission
    description: For employee or company permissions
  - name: Vendor
    description: For vendor login, signup and details
  - name: Import Customer Data
    description: For import customers through excel file
  - name: Quickbooks Integration
    description: For Quickbooks customers integration
  - name: Integration
    description: For creating service ticket via web
  - name: Script
    description: To run script, not to be run frequently. Only use these API if you know what you are doing.
paths:
  /login:
    post:
      tags:
        - Auth
      summary: Login all kind of users and get auth token for further requests
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAPIResponse'
  /signUp:
    post:
      tags:
        - Auth
      summary: Sign up as company Admin and creates company
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - accountType
                - email
                - password
                - firstName
                - lastName
                - phone
              properties:
                accountType:
                  type: string
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                  description: 1 => SERVICE PROVIDER, 2 => BUILDER, 3 => SUPPLIER, 4 => INDEPENDENT CONTRACTOR, 5 => COMPANY (old company signup)
                email:
                  type: string
                  description: Email address of the user login
                password:
                  type: string
                  description: Password for the user login
                firstName:
                  type: string
                  description: First name of the user
                lastName:
                  type: string
                  description: Last name of the user
                phone:
                  type: string
                  description: Phone number of the user
                companyName:
                  type: string
                  description: '**REQUIRED when** accountType is 5 (COMPANY) for old company signup'
                supplierName:
                  type: string
                  description: '**REQUIRED when** accountType is 3 (SUPPLIER) for supplier signup'
                industryId:
                  type: string
                  description: Id of the selected industry from the industries fetched with /getIndustries API
                companyId:
                  type: string
                  description: '**REQUIRED when** accountType is 1 (SERVICE PROVIDER)'
                customerId:
                  type: string
                  description: '**REQUIRED when** accountType is 2 (BUILDER)'
                role:
                  type: string
                  enum:
                    - OfficeAdmin
                    - Technician
                    - Manager
                    - Admin
                  description: Used for Company's employee role
                isci:
                  type: boolean
                  description: Abbreviation of 'isContractInvitation', boolean value to trigger BE to create notification and vendor contract after the sign up
                cid:
                  type: string
                  description: Abbreviation of 'companyId', company that hiring/inviting the contractor
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAPIResponse'
  /getAllCompanies:
    get:
      tags:
        - Auth
      summary: Search for companies
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
  /getAllCustomers:
    get:
      tags:
        - Auth
      summary: Search for customers
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
  /logout:
    post:
      tags:
        - Auth
      summary: Logout for all kind user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAPIResponse'
      security:
        - Bearer: []
  /searchContractor:
    post:
      tags:
        - Vendor
      summary: Search for vendors
      description: Company can serach vendor
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                keyword:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
        - Bearer: []
  /inviteContractor:
    post:
      tags:
        - Vendor
      summary: To invite vendor to join BlueClerk
      description: A company can invite a vendor
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: email of vendor to invite
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /remindContractor:
    post:
      tags:
        - Vendor
      summary: To resend the invitation email to the contractor
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractId
              properties:
                contractId:
                  type: string
                  description: Id of the contract
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /startContract:
    post:
      tags:
        - Vendor
      summary: To send offer to a vendor
      description: A company can initiate a contract with vendor
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractorId
              properties:
                contractorId:
                  type: string
                  description: Id of a vendor fetched with /searchContractor api
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /updateContract:
    put:
      tags:
        - Vendor
      summary: 'To update a contract of a company '
      description: Update contract from a company
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractId
                - status
              properties:
                contractId:
                  type: string
                  description: Id of a contract fetched by /getContracts api
                status:
                  type: integer
                  description: status of contract, 1=ACCEPTED, 4=FINISHED
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /finishContract:
    post:
      tags:
        - Vendor
      summary: Finishing contract by company
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractId
              properties:
                contractId:
                  type: string
                  description: Id of a contract fetched by /getContracts api
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getContracts:
    post:
      tags:
        - Vendor
      summary: To get all contracts by vendor
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  industries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
      security:
        - Bearer: []
  /getCompanyContracts:
    post:
      tags:
        - Vendor
      summary: To get all contracts by company
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  industries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
      security:
        - Bearer: []
  /getContractors:
    get:
      tags:
        - Vendor
      summary: To get all vendors and employees
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getContractorDetail:
    post:
      tags:
        - Vendor
      summary: To get detail of a vendor.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: []
              properties:
                type:
                  type: string
                  enum:
                    - vendor
                    - employee
                contractorId:
                  type: string
                  description: Id of contractor for getting detail
                employeeId:
                  type: string
                  description: Id of employee for getting detail
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  contractors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
      security:
        - Bearer: []
  /updateContractorEmailPreferences:
    post:
      tags:
        - Vendor
      summary: This API used to update contractor email preferences
      description: 0 for email everytime a job is scheduled, 1 for once a day at night and 2 for no emails. Needs to be logged in as company admin first
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractorId
                - emailPreferences
              properties:
                contractorId:
                  type: string
                  description: The contractor company id
                emailPreferences:
                  type: number
                emailTime:
                  type: string
                  description: HH:MM:SS
                timeZone:
                  type: string
                  description: 'example: America/Chicago'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getCompanyContractorActivity:
    post:
      tags:
        - Vendor
      summary: To get all company vendors activity
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  contractorActivity:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractorActivity'
      security:
        - Bearer: []
  /upgradeToCompany:
    post:
      tags:
        - Vendor
      summary: Upgrading from vendor to company account
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - ending
                - token
              properties:
                token:
                  type: string
                  description: strip token got from mobile end
                ending:
                  type: string
                  description: last 4 digits of card
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /updateCommission:
    put:
      tags:
        - Vendor
      summary: Update commission for vendor and employee
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - type
                - id
                - commissionEffectiveDate
              properties:
                type:
                  type: string
                  enum:
                    - vendor
                    - employee
                id:
                  type: string
                  description: Id of vendor or employee
                commission:
                  type: number
                  description: Send a blank value to make the commission null on database
                commissionEffectiveDate:
                  type: date
                  description: Effective date that the commission will apply
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getCommissionHistory/{beneficiaryId}:
    get:
      tags:
        - Vendor
      summary: Retrieve commission history for vendor or employee
      description: Returns a commission history for the specified vendor/employee id
      parameters:
        - name: beneficiaryId
          in: path
          description: The id of the vendor or employee to retrieve from the database
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommissionHistoryResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  history:
                    type: array
      security:
        - Bearer: []
  /changeContractorPermission:
    post:
      tags:
        - Permission
      summary: Assigning permissions to contractor
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - contractorId
                - permissions
              properties:
                contractorId:
                  type: string
                  description: Id of a contractor
                permissions:
                  type: string
                  description: comma seprated permissions
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /checkAndGet:
    post:
      tags:
        - Social Auth
      summary: Check if user has already signed up using Facebook or google
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - connectorType
                - socialId
              properties:
                socialId:
                  type: string
                  description: Social id returned by facebook or google sdk
                connectorType:
                  type: number
                  description: 0 for Facebook and 1 for Google
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAPIResponse'
  /signUpSocial:
    post:
      tags:
        - Social Auth
      summary: Sign up for company using Facebook or Google
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - companyName
                - connectorType
                - email
                - firstName
                - industryId
                - lastName
                - phone
                - socialId
              properties:
                email:
                  type: string
                  description: email address of admin of a company
                firstName:
                  type: string
                  description: first Name of admin of company
                lastName:
                  type: string
                  description: last Name of admin of company
                phone:
                  type: string
                  description: phone number of admin of company
                companyName:
                  type: string
                industryId:
                  type: string
                  description: Id of the selected industry from the industries fetched with /getIndustries api
                socialId:
                  type: string
                  description: Social id from Facebook or Google sdk
                connectorType:
                  type: number
                  description: 0 for Facebook and 1 for Google
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAPIResponse'
  /contractorSignUpSocial:
    post:
      tags:
        - Social Auth
      summary: Sign up for contractor using Facebook or Google
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - companyName
                - connectorType
                - email
                - firstName
                - industryId
                - lastName
                - phone
                - socialId
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                companyName:
                  type: string
                industryId:
                  type: string
                  description: Id of the selected industry from the industries fetched with /getIndustries api
                socialId:
                  type: string
                  description: Social id from Facebook or Google sdk
                connectorType:
                  type: number
                  description: 0 for Facebook and 1 for Google
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/AuthAPIResponse'
  /setCustomWorkOrderNumber:
    post:
      tags:
        - Job
      summary: Setting custom work order number for service tickets and job
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                workOrderNumber:
                  type: number
                prefix:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getCurrentJobId:
    post:
      tags:
        - Job
      summary: Getting latest custom work order number for service tickets and job
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/WorkOrderNumberResponse'
      security:
        - Bearer: []
  /setCustomInvoiceNumber:
    post:
      tags:
        - Invoice
      summary: Setting custom invoce number for invoices
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                invoiceNumber:
                  type: number
                invoicePrefix:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getCurrentInvoiceNumber:
    post:
      tags:
        - Invoice
      summary: Getting current invoice numbe for company
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/InvoiceNumberResponse'
      security:
        - Bearer: []
  /createIndustry:
    post:
      tags:
        - Industry
      summary: To create an industry
      description: Only a global admin can create an industry
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getIndustries:
    post:
      tags:
        - Industry
      summary: To get all industries
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  industries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Industry'
  /createManager:
    post:
      tags:
        - Users
      summary: To create a manager
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
                - firstName
                - lastName
                - phone
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /createTechnician:
    post:
      tags:
        - Users
      summary: To create a technician
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
                - firstName
                - lastName
                - phone
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /createAdminEmployee:
    post:
      tags:
        - Users
      summary: To create an office employee
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - email
                - firstName
                - lastName
                - phone
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/GeneralAPIResponse'
      security:
        - Bearer: []
  /getManagers:
    post:
      tags:
        - Users
      summary: To get all managers created by a company
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
      security:
        - Bearer: []
  /getTechnicians:
    post:
      tags:
        - Users
      summary: To get all technicians created by a company
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  GeneralAPIResponse:
                    $ref: '#/components/schemas/GeneralAPIResponse'
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
      security:
        - Bearer: []
