<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <title>Offline - Cycle POS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #1f1f1f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #16a34a;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: #a1a1aa;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .primary {
      background: #16a34a;
      color: white;
    }
    .primary:hover {
      background: #15803d;
    }
    .secondary {
      background: #27272a;
      color: white;
    }
    .secondary:hover {
      background: #3f3f46;
    }
    .status {
      margin-top: 32px;
      padding: 16px;
      background: #1f1f1f;
      border-radius: 8px;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.online {
      background: #22c55e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a5 5 0 01-7.072-7.072m0 0l2.829 2.829M3 3l18 18" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features may be limited, but you can still access cached data and create offline orders.</p>
    
    <div class="actions">
      <button class="primary" onclick="location.reload()">Try Again</button>
      <button class="secondary" onclick="goToPOS()">Go to POS</button>
    </div>

    <div class="status">
      <div class="status-indicator">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Checking connection...</span>
      </div>
    </div>
  </div>

  <script>
    function goToPOS() {
      window.location.href = '/pos';
    }

    function updateStatus() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Connection restored! Reloading...';
        setTimeout(() => location.reload(), 1000);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Offline - Working with cached data';
      }
    }

    // Check status on load
    updateStatus();

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
  </script>
</body>
</html>
