spring.application.name=AssetVaultBackend
spring.profiles.active=local

# Supabase PostgreSQL Configuration (Production - override with SPRING_PROFILES_ACTIVE=prod)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - limit connections for Supabase free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server Port
server.port=8000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allow-credentials=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Wallet Configuration (used by PatientWalletAllocatorService)
blockchain.wallet.address=0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266

# Blockchain Runtime
# NOTE: For local Hardhat, default RPC is http://127.0.0.1:8545 and chainId 31337
blockchain.enabled=true
blockchain.rpc-url=http://127.0.0.1:8545
blockchain.chain-id=31337

# Backend signer for admin-only contract calls (mint/burn)
# This is Hardhat account #0 (well-known dev key — DO NOT use in production)
blockchain.wallet.private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

# Deployed contract addresses (deterministic on a fresh Hardhat node when account #0
# deploys AssetToken → HealthToken → HospitalFinancials in this exact order).
blockchain.contracts.asset-token=0x5FC8d32690cc91D4c39d9d3abcBD16989F875707
blockchain.contracts.health-token=0x0165878A594ca255338adfa4d48449f69242Eb8F
blockchain.contracts.hospital-financials=0xa513E6E4b8f2a923D98304ec87F64353C4D5C853

# Gas defaults
blockchain.gas.price=1000000000
blockchain.gas.limit=6000000

# Gold and Silver Price APIs
pricing.gold-api-url=https://api.gold-api.com/price/XAU
pricing.silver-api-url=https://api.gold-api.com/price/XAG
pricing.gold-api-key=${GOLD_API_KEY}

# Exchange Rate API
pricing.exchange-api-url=https://api.exchangerate-api.com/v4/latest/USD
pricing.exchange-api-key=${EXCHANGE_RATE_API_KEY}

# Cache duration for pricing data (in minutes)
pricing.cache-duration-minutes=5

# Patient wallet pool
blockchain.patient-wallet-addresses=0x70997970C51812dc3A010C7d01b50e0d17dc79C8,0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC,0x90F79bf6EB2c4f870365E785982E1f101E93b906,0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65,0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc,0x976EA74026E726554dB657fA54763abd0C3a0aa9,0x14dC79964da2C08b23698B3D3cc7Ca32193d9955,0x23618e81E3f5cdF7f54C3d65f7FBc0aBf5B21E8f,0xa0Ee7A142d267C1f36714E4a8F75612F20a79720,0xBcd4042DE499D14e55001CcbB24a551F3b954096,0x71bE63f3384f5fb98995898A86B02Fb2426c5788,0xFABB0ac9d68B0B445fB7357272Ff202C5651694a,0x1CBd3b2770909D4e10f157cABC84C7264073C9Ec,0xdF3e18d64BC6A983f673Ab319CCaE4f1a57C7097,0xcd3B766CCDd6AE721141F452C550Ca635964ce71,0x2546BcD3c84621e976D8185a91A922aE77ECEc30,0xbDA5747bFD65F08deb54cb465eB87D40e51B197E,0xdD2FD4581271e230360230F9337D5c0430Bf44C0,0x8626f6940E2eb28930eFb4CeF49B2d1F2C9C1199

