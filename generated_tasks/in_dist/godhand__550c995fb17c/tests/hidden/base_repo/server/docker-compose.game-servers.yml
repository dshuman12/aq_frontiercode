services:
  game_na_west_1:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: godhand:latest
    ports:
      - "5051:5001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MAIN_APP_INCLUDE_GAME_WS: "false"
      BACKEND_PUBLIC_BASE_URL: "http://localhost:5050"
      CHAT_WS_PUBLIC_BASE_URL: "http://localhost:5050"
      GAME_WS_PUBLIC_BASE_URL: "http://localhost:5051"
      CONTROL_PLANE_INTERNAL_BASE_URL: "${CONTROL_PLANE_INTERNAL_BASE_URL:-http://host.docker.internal:5050}"
      GAME_SERVER_INTERNAL_TOKEN: "${GAME_SERVER_INTERNAL_TOKEN:?set GAME_SERVER_INTERNAL_TOKEN in server/.env}"
      GAME_SERVER_SELF_ID: "na-west-1"
      GAME_SERVER_SELF_REGION: "NA West 1"
      GAME_SERVER_SELF_OFFICIAL_KEYS: "na-west-1"
      GAME_SERVER_SELF_SIGNING_SECRET: "${GAME_SERVER_SECRET_NA_WEST_1:?set GAME_SERVER_SECRET_NA_WEST_1 in server/.env}"
    command: gunicorn -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:5001 server.game_server:app

