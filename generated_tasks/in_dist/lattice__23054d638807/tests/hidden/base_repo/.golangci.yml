linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: package-comments
      - name: indent-error-flow
      - name: unreachable-code
      - name: error-return
      - name: error-strings

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, revive]

run:
  timeout: 3m
