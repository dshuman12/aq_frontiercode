  - id: scope_matches_reference_intent
    category: regular
    description: >
      The patch stays within the feature and test areas implicated by the source fix commit,
      avoiding unrelated rewrites or broad file churn.
    method: scope
    blocker: true
    weight: 0.15
    scope:
      allowed_paths: ["pkg/merkle/", "pkg/merkle/merkle_invariant_test.go", "pkg/merkle/tree.go"]
      denied_paths: []
      max_files: 6
      max_changed_lines: 250
  - id: no_hidden_asset_leak
    category: regular
    description: >
      The agent-visible repository does not contain generated hidden tests, grader assets,
      reference patches, or fix commit identifiers.
    method: command
    blocker: true
    weight: 0.05
    command: python3 tests/hidden/run_criteria.py --criterion no_hidden_asset_leak environment/repo
  - id: behavior_core_requirement
    category: patch_specific
    description: >
      The submitted patch satisfies the central maintainer request, not just the narrow
      visible test command.
    method: llm_prompt
    blocker: false
    weight: 0.02
    threshold: 0.6
    prompt: >
      Score whether the diff fully resolves this task for SwarmSync: SwarmSync replicas
      reconcile state using a Merkle tree diff. The package exposes two diff implementations
      that must always agree: an authoritative full-scan `Diff` and an optimized tree-walking
      `FastDiff`. There is a bug in `FastDiff`: when the two trees have DIFFERENT sizes (and
      therefore different internal shapes), `FastDiff` returns the wrong set of differing keys
      — its `OnlyLocal`, `OnlyRemote`, and `Different` results disagree with what `Diff`
      reports for the same pair of trees. For two trees of equal size and identical key layout
      the results happen to match, which is why the defect is easy to miss. When the fast walk
      reaches a point where one side is a single leaf and the other side is an interior
      subtree, it attributes the leaves to the wrong side. Fix `FastDiff` so it produces
      exactly the same `OnlyLocal`/`OnlyRemote`/`Different` sets as `Diff` for any pair of
      trees, regardless of their relative sizes or shapes. Do not change the behavior of
      `Diff` itself or any other public API.
