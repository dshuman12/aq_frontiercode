<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FrontierCode Local</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div>
          <p class="eyebrow">Local Evaluation Platform</p>
          <h1>FrontierCode</h1>
        </div>
      </div>
      <div class="summary-strip" id="summaryStrip"></div>
    </header>

    <main class="workspace">
      <aside class="task-rail">
        <div class="rail-controls">
          <input id="searchInput" type="search" placeholder="Search tasks, models, criteria" autocomplete="off">
          <div class="segmented" role="tablist" aria-label="Task filters">
            <button class="active" data-filter="all" type="button">All</button>
            <button data-filter="pass" type="button">Pass</button>
            <button data-filter="fail" type="button">Fail</button>
            <button data-filter="unrun" type="button">Unrun</button>
          </div>
        </div>
        <div class="task-list" id="taskList"></div>
      </aside>

      <section class="detail-pane">
        <div class="detail-header" id="detailHeader"></div>
        <div class="metric-grid" id="metricGrid"></div>
        <nav class="tabs" id="tabs" aria-label="Artifact tabs"></nav>
        <div class="tab-panel" id="tabPanel"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
